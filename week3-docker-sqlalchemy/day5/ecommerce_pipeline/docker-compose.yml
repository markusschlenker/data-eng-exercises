services:
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ingest_job
    env_file:
      - .env
    volumes:
      - logs:/app/logs
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net
    restart: "no"

  db:
    image: postgres:16
    container_name: postgres_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${DB_NAME} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  logs:

networks:
  app-net:
    driver: bridge
