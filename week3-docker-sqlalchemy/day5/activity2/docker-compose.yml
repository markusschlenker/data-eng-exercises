version: "3.9" 
 
services: 
  my-python-service: 
    image: python:3.11-slim  # choose sth different from Dockerfile to test build
    container_name: python_app_w3d5act2
    build: 
      context: .
      dockerfile: Dockerfile 
    volumes: 
      - ./app:/app    # optional: allows editing code without rebuilding 
    #command: ["sh", "-c", "python -u app.py && tail -f /dev/null"]  # will keep container UP
    command:  ["python", "-u", "app/app.py"]  # container will EXIT after execution

  my-database-service: 
    image: postgres:15-alpine 
    container_name: postgres_db_w3d5act2
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres 
      POSTGRES_DB: mydb 
    ports: 
      - "5433:5432"  # expose port for external access (optional)