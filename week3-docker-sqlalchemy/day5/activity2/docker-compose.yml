services: 
  my-python-service: 
    image: python:3.11-slim  # choose sth different from Dockerfile to test build
    container_name: python_app_w3d5act2
    build: 
      context: .
      dockerfile: Dockerfile 
    depends_on:
      my-database-service:
        condition: service_healthy
    # command: ["sh", "-c", "tail -f /dev/null"]  # debugging without running app first
    command: ["sh", "-c", "python -u app.py && tail -f /dev/null"]  # will keep container UP
    # command:  ["python", "-u", "app.py"]  # container will EXIT after execution

  # note: if connected to db-service with pgadmin, disconnect before restarting an updated database service
  #       to avoid misleading error messages from server in container (e.g. changing DB_NAME)
  my-database-service: 
    image: postgres:16
    container_name: postgres_db_w3d5act2
    env_file:
      - .env
    environment: 
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports: 
      - "${PG_PORT}:5432"  # expose port for external access (optional)
    healthcheck:
      # more robust healthcheck then pg_isready: container stops if PG_USER or DB_NAME do not exist
      test: ["CMD-SHELL", "psql -U ${PG_USER} -d ${DB_NAME} -c 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
